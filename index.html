<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle de Gastos</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/docx/8.5.0/docx.umd.min.js"></script>
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2e2e2e;
    --accent: #c8f04a;
    --accent2: #4af0a0;
    --text: #f0f0f0;
    --muted: #888;
    --danger: #f04a4a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; padding: 32px 20px; }

  header { max-width: 900px; margin: 0 auto 40px; display: flex; align-items: flex-end; justify-content: space-between; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
  header h1 { font-size: 2rem; font-weight: 800; letter-spacing: -1px; line-height: 1; }
  header h1 span { color: var(--accent); }
  header p { color: var(--muted); font-size: 0.8rem; font-family: 'DM Mono', monospace; }

  .container { max-width: 900px; margin: 0 auto; display: flex; flex-direction: column; gap: 24px; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 28px; }
  .card-title { font-size: 0.7rem; font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: 2px; color: var(--accent); margin-bottom: 20px; }

  .form-row { display: grid; grid-template-columns: 160px 1fr 160px auto; gap: 12px; align-items: end; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group label { font-size: 0.7rem; color: var(--muted); font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: 1px; }
  input, select {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 10px;
    color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.9rem;
    padding: 12px 14px; outline: none; transition: border-color 0.2s; width: 100%;
  }
  input:focus, select:focus { border-color: var(--accent); }
  input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1) opacity(0.4); cursor: pointer; }

  .btn { padding: 12px 20px; border: none; border-radius: 10px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.9rem; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .btn-primary { background: var(--accent); color: #0f0f0f; }
  .btn-primary:hover { background: #d8ff5a; transform: translateY(-1px); }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
  .btn-export { background: #1a1a2e; color: #a0c4ff; border: 1px solid #334; font-size: 0.85rem; padding: 10px 18px; }
  .btn-export:hover { border-color: #a0c4ff; transform: translateY(-1px); }
  .btn-danger { background: transparent; color: var(--danger); border: 1px solid transparent; padding: 6px 10px; font-size: 0.75rem; border-radius: 6px; }
  .btn-danger:hover { border-color: var(--danger); background: rgba(240,74,74,0.08); }

  .filters { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 20px; }
  .filters select { width: auto; }

  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
  .stat { background: var(--surface2); border-radius: 12px; padding: 20px; border: 1px solid var(--border); }
  .stat-label { font-size: 0.65rem; color: var(--muted); font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; }
  .stat-value { font-size: 1.5rem; font-weight: 800; color: var(--accent); letter-spacing: -1px; }
  .stat-value.green { color: var(--accent2); }

  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; font-size: 0.65rem; font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); padding: 0 12px 14px; border-bottom: 1px solid var(--border); }
  td { padding: 14px 12px; font-size: 0.88rem; border-bottom: 1px solid rgba(46,46,46,0.5); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(200,240,74,0.03); }
  .td-date { font-family: 'DM Mono', monospace; color: var(--muted); font-size: 0.8rem; white-space: nowrap; }
  .td-valor { font-family: 'DM Mono', monospace; font-weight: 600; text-align: right; white-space: nowrap; }
  .td-actions { text-align: right; }
  .empty { text-align: center; padding: 48px 0; color: var(--muted); font-size: 0.85rem; font-family: 'DM Mono', monospace; }
  .empty span { display: block; font-size: 2rem; margin-bottom: 12px; opacity: 0.3; }
  .total-row td { font-weight: 700; border-top: 2px solid var(--border); border-bottom: none !important; color: var(--accent); font-family: 'DM Mono', monospace; }

  /* MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.85); backdrop-filter: blur(6px);
    z-index: 1000; align-items: center; justify-content: center; padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #fff; color: #111; border-radius: 16px;
    width: 100%; max-width: 820px; max-height: 90vh;
    display: flex; flex-direction: column; overflow: hidden;
    box-shadow: 0 32px 80px rgba(0,0,0,0.6);
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 28px; border-bottom: 1px solid #e5e5e5; background: #f9f9f9;
  }
  .modal-header h2 { font-size: 1rem; font-weight: 700; color: #111; }
  .modal-header p { font-size: 0.75rem; color: #888; margin-top: 2px; font-family: 'DM Mono', monospace; }
  .modal-close { background: none; border: none; font-size: 1.4rem; cursor: pointer; color: #888; padding: 4px 8px; border-radius: 6px; }
  .modal-close:hover { background: #eee; color: #333; }
  .modal-body { flex: 1; overflow-y: auto; padding: 28px; }

  .preview-doc { font-family: Arial, sans-serif; font-size: 13px; color: #111; }
  .preview-doc .doc-title { font-size: 18px; font-weight: bold; text-align: center; margin-bottom: 4px; }
  .preview-doc .doc-sub { text-align: center; color: #666; font-size: 12px; margin-bottom: 24px; }
  .preview-doc .doc-stats { display: flex; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; margin-bottom: 20px; }
  .preview-doc .doc-stat { flex: 1; padding: 14px 16px; border-right: 1px solid #ddd; }
  .preview-doc .doc-stat:last-child { border-right: none; }
  .preview-doc .doc-stat-label { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
  .preview-doc .doc-stat-value { font-size: 16px; font-weight: bold; }
  .preview-doc table { width: 100%; border-collapse: collapse; }
  .preview-doc th { background: #f0f0f0; padding: 10px 12px; text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #555; border: 1px solid #ddd; }
  .preview-doc th:last-child { text-align: right; }
  .preview-doc td { padding: 9px 12px; border: 1px solid #e5e5e5; font-size: 12.5px; }
  .preview-doc td:last-child { text-align: right; font-weight: 600; }
  .preview-doc .total-tr td { background: #f0f0f0; font-weight: bold; border-top: 2px solid #999; }
  .preview-doc .footer { margin-top: 24px; font-size: 11px; color: #aaa; text-align: right; }

  .modal-footer {
    padding: 16px 28px; border-top: 1px solid #e5e5e5; background: #f9f9f9;
    display: flex; gap: 12px; justify-content: flex-end; align-items: center;
  }
  .mbtn { padding: 10px 22px; border: none; border-radius: 8px; font-weight: 700; font-size: 0.88rem; cursor: pointer; transition: all 0.15s; font-family: 'Syne', sans-serif; }
  .mbtn-cancel { background: #eee; color: #555; }
  .mbtn-cancel:hover { background: #e0e0e0; }
  .mbtn-pdf { background: #e53e3e; color: #fff; }
  .mbtn-pdf:hover { background: #c53030; transform: translateY(-1px); }
  .mbtn-word { background: #2b579a; color: #fff; }
  .mbtn-word:hover { background: #1e3f7a; transform: translateY(-1px); }

  @media (max-width: 640px) {
    .form-row { grid-template-columns: 1fr 1fr; }
    .form-row .btn { grid-column: span 2; }
    .stats { grid-template-columns: 1fr; }
    .modal-footer { flex-direction: column; }
    .mbtn { width: 100%; text-align: center; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>Controle de <span>Gastos</span></h1>
  </div>
  <p id="today-date"></p>
</header>

<div class="container">

  <div class="card">
    <div class="card-title">// Novo lançamento</div>
    <div class="form-row">
      <div class="form-group">
        <label>Data</label>
        <input type="date" id="inp-data">
      </div>
      <div class="form-group">
        <label>Histórico / Descrição</label>
        <input type="text" id="inp-hist" placeholder="Ex: Boleto marzari, 100L óleo diesel...">
      </div>
      <div class="form-group">
        <label>Valor (R$)</label>
        <input type="text" id="inp-valor" placeholder="0,00" inputmode="decimal">
      </div>
      <button class="btn btn-primary" onclick="addItem()">+ Adicionar</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">// Lançamentos</div>

    <div class="filters">
      <select id="filter-year" onchange="populateMonths(); render()">
        <option value="">Todos os anos</option>
      </select>
      <select id="filter-month" onchange="render()">
        <option value="">Todos os meses</option>
      </select>
      <button class="btn btn-secondary" onclick="clearFilters()">Limpar</button>
      <div style="margin-left:auto;">
        <button class="btn btn-export" onclick="openPreview()">👁️ Pré-visualizar &amp; Exportar</button>
      </div>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-label">Total do período</div>
        <div class="stat-value" id="stat-total">R$ 0,00</div>
      </div>
      <div class="stat">
        <div class="stat-label">Lançamentos</div>
        <div class="stat-value green" id="stat-count">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Média por lançamento</div>
        <div class="stat-value" id="stat-avg">R$ 0,00</div>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Data</th>
            <th>Histórico</th>
            <th style="text-align:right">Valor</th>
            <th style="text-align:right">Ação</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
        <tfoot id="tfoot"></tfoot>
      </table>
    </div>
  </div>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <div>
        <h2>Pré-visualização do Relatório</h2>
        <p id="modal-periodo-label"></p>
      </div>
      <button class="modal-close" onclick="closePreview()">✕</button>
    </div>
    <div class="modal-body">
      <div class="preview-doc" id="preview-content"></div>
    </div>
    <div class="modal-footer">
      <button class="mbtn mbtn-cancel" onclick="closePreview()">Fechar</button>
      <button class="mbtn mbtn-word" onclick="exportWord()">⬇️ Baixar Word (.docx)</button>
      <button class="mbtn mbtn-pdf" onclick="exportPDF()">🖨️ Salvar como PDF</button>
    </div>
  </div>
</div>

<script>
  let gastos = JSON.parse(localStorage.getItem('gastos') || '[]');

  document.getElementById('inp-data').valueAsDate = new Date();
  document.getElementById('today-date').textContent = new Date().toLocaleDateString('pt-BR', {weekday:'long', day:'2-digit', month:'long', year:'numeric'});

  const MESES = ['','Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

  function save() { localStorage.setItem('gastos', JSON.stringify(gastos)); }
  function parseBRL(str) { return parseFloat(str.replace(/\./g,'').replace(',','.')) || 0; }
  function formatBRL(n) { return n.toLocaleString('pt-BR', {style:'currency', currency:'BRL'}); }

  function addItem() {
    const data = document.getElementById('inp-data').value;
    const hist = document.getElementById('inp-hist').value.trim();
    const valor = parseBRL(document.getElementById('inp-valor').value);
    if (!data || !hist || !valor) { alert('Preencha todos os campos!'); return; }
    gastos.push({ id: Date.now(), data, hist, valor });
    gastos.sort((a,b) => a.data.localeCompare(b.data));
    save();
    document.getElementById('inp-hist').value = '';
    document.getElementById('inp-valor').value = '';
    document.getElementById('inp-hist').focus();
    populateYears(); populateMonths(); render();
  }

  function removeItem(id) {
    if (!confirm('Remover este lançamento?')) return;
    gastos = gastos.filter(g => g.id !== id);
    save(); populateYears(); populateMonths(); render();
  }

  function getFiltered() {
    const month = document.getElementById('filter-month').value;
    const year = document.getElementById('filter-year').value;
    return gastos.filter(g => {
      const [y, m] = g.data.split('-');
      if (year && y !== year) return false;
      if (month && m !== month) return false;
      return true;
    });
  }

  function getPeriodoLabel() {
    const month = document.getElementById('filter-month').value;
    const year = document.getElementById('filter-year').value;
    if (month && year) return `${MESES[+month]} de ${year}`;
    if (year) return `Ano de ${year}`;
    if (month) return MESES[+month];
    return 'Todos os registros';
  }

  function populateYears() {
    const years = [...new Set(gastos.map(g => g.data.split('-')[0]))].sort().reverse();
    const sel = document.getElementById('filter-year');
    const cur = sel.value;
    sel.innerHTML = '<option value="">Todos os anos</option>';
    years.forEach(y => sel.innerHTML += `<option value="${y}" ${y===cur?'selected':''}>${y}</option>`);
  }

  function populateMonths() {
    const year = document.getElementById('filter-year').value;
    const months = [...new Set(gastos.filter(g => !year || g.data.startsWith(year)).map(g => g.data.split('-')[1]))].sort();
    const sel = document.getElementById('filter-month');
    const cur = sel.value;
    sel.innerHTML = '<option value="">Todos os meses</option>';
    months.forEach(m => sel.innerHTML += `<option value="${m}" ${m===cur?'selected':''}>${MESES[+m]}</option>`);
  }

  function clearFilters() {
    document.getElementById('filter-month').value = '';
    document.getElementById('filter-year').value = '';
    populateMonths(); render();
  }

  function render() {
    const filtered = getFiltered();
    const tbody = document.getElementById('tbody');
    const tfoot = document.getElementById('tfoot');
    const total = filtered.reduce((s,g) => s+g.valor, 0);
    const avg = filtered.length ? total/filtered.length : 0;

    document.getElementById('stat-total').textContent = formatBRL(total);
    document.getElementById('stat-count').textContent = filtered.length;
    document.getElementById('stat-avg').textContent = formatBRL(avg);

    if (!filtered.length) {
      tbody.innerHTML = `<tr><td colspan="4" class="empty"><span>📋</span>Nenhum lançamento encontrado</td></tr>`;
      tfoot.innerHTML = ''; return;
    }

    tbody.innerHTML = filtered.map(g => `
      <tr>
        <td class="td-date">${g.data.split('-').reverse().join('/')}</td>
        <td>${g.hist}</td>
        <td class="td-valor">${formatBRL(g.valor)}</td>
        <td class="td-actions"><button class="btn btn-danger" onclick="removeItem(${g.id})">✕</button></td>
      </tr>`).join('');

    tfoot.innerHTML = `
      <tr class="total-row">
        <td colspan="2" style="font-family:'DM Mono',monospace;font-size:0.78rem;letter-spacing:1px;">TOTAL (${filtered.length} lançamentos)</td>
        <td class="td-valor">${formatBRL(total)}</td>
        <td></td>
      </tr>`;
  }

  // ── PREVIEW MODAL ──
  function openPreview() {
    const filtered = getFiltered();
    const total = filtered.reduce((s,g) => s+g.valor, 0);
    const avg = filtered.length ? total/filtered.length : 0;
    const periodo = getPeriodoLabel();
    const geradoEm = new Date().toLocaleDateString('pt-BR', {day:'2-digit',month:'long',year:'numeric'});

    document.getElementById('modal-periodo-label').textContent = `Período: ${periodo}`;

    const rows = filtered.map(g => `
      <tr>
        <td>${g.data.split('-').reverse().join('/')}</td>
        <td>${g.hist}</td>
        <td>${formatBRL(g.valor)}</td>
      </tr>`).join('');

    document.getElementById('preview-content').innerHTML = `
      <div class="doc-title">Relatório de Gastos</div>
      <div class="doc-sub">Período: ${periodo} &nbsp;·&nbsp; Gerado em: ${geradoEm}</div>
      <div class="doc-stats">
        <div class="doc-stat"><div class="doc-stat-label">Total do período</div><div class="doc-stat-value">${formatBRL(total)}</div></div>
        <div class="doc-stat"><div class="doc-stat-label">Lançamentos</div><div class="doc-stat-value">${filtered.length}</div></div>
        <div class="doc-stat"><div class="doc-stat-label">Média por lançamento</div><div class="doc-stat-value">${formatBRL(avg)}</div></div>
      </div>
      <table>
        <thead><tr><th>Data</th><th>Histórico / Descrição</th><th>Valor</th></tr></thead>
        <tbody>${rows || '<tr><td colspan="3" style="text-align:center;color:#aaa;padding:20px">Nenhum lançamento</td></tr>'}</tbody>
        <tfoot><tr class="total-tr"><td colspan="2">TOTAL (${filtered.length} lançamentos)</td><td>${formatBRL(total)}</td></tr></tfoot>
      </table>
      <div class="footer">Documento gerado em ${geradoEm}</div>`;

    document.getElementById('modal-overlay').classList.add('open');
  }

  function closePreview() {
    document.getElementById('modal-overlay').classList.remove('open');
  }

  document.getElementById('modal-overlay').addEventListener('click', function(e) {
    if (e.target === this) closePreview();
  });

  // ── EXPORT PDF ──
  function exportPDF() {
    const filtered = getFiltered();
    const total = filtered.reduce((s,g) => s+g.valor, 0);
    const avg = filtered.length ? total/filtered.length : 0;
    const periodo = getPeriodoLabel();
    const geradoEm = new Date().toLocaleDateString('pt-BR', {day:'2-digit',month:'long',year:'numeric'});

    const rows = filtered.map(g => `
      <tr>
        <td style="padding:8px 10px;border:1px solid #e5e5e5;">${g.data.split('-').reverse().join('/')}</td>
        <td style="padding:8px 10px;border:1px solid #e5e5e5;">${g.hist}</td>
        <td style="padding:8px 10px;border:1px solid #e5e5e5;text-align:right;font-weight:600;">${formatBRL(g.valor)}</td>
      </tr>`).join('');

    const html = `<!DOCTYPE html><html><head><meta charset="UTF-8">
    <style>
      body{font-family:Arial,sans-serif;padding:40px;color:#111;font-size:13px;}
      h1{font-size:20px;text-align:center;margin-bottom:4px;}
      .sub{text-align:center;color:#666;font-size:12px;margin-bottom:24px;}
      .stats{display:flex;border:1px solid #ddd;border-radius:6px;overflow:hidden;margin-bottom:20px;}
      .stat{flex:1;padding:12px 16px;border-right:1px solid #ddd;}
      .stat:last-child{border-right:none;}
      .sl{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}
      .sv{font-size:15px;font-weight:bold;}
      table{width:100%;border-collapse:collapse;}
      th{background:#f0f0f0;padding:10px;text-align:left;font-size:11px;text-transform:uppercase;border:1px solid #ddd;}
      th:last-child{text-align:right;}
      .tot td{background:#f0f0f0;font-weight:bold;padding:10px;border:1px solid #ddd;border-top:2px solid #999;}
      .tot td:last-child{text-align:right;}
      .foot{margin-top:20px;font-size:11px;color:#aaa;text-align:right;}
    </style></head><body>
    <h1>Relatório de Gastos</h1>
    <div class="sub">Período: ${periodo} &nbsp;·&nbsp; Gerado em: ${geradoEm}</div>
    <div class="stats">
      <div class="stat"><div class="sl">Total</div><div class="sv">${formatBRL(total)}</div></div>
      <div class="stat"><div class="sl">Lançamentos</div><div class="sv">${filtered.length}</div></div>
      <div class="stat"><div class="sl">Média</div><div class="sv">${formatBRL(avg)}</div></div>
    </div>
    <table>
      <thead><tr><th>Data</th><th>Histórico / Descrição</th><th style="text-align:right">Valor</th></tr></thead>
      <tbody>${rows}</tbody>
      <tfoot><tr class="tot"><td colspan="2">TOTAL (${filtered.length} lançamentos)</td><td style="text-align:right">${formatBRL(total)}</td></tr></tfoot>
    </table>
    <div class="foot">Gerado em ${geradoEm}</div>
    </body></html>`;

    const w = window.open('', '_blank');
    w.document.write(html);
    w.document.close();
    w.onload = () => { w.focus(); w.print(); };
  }

  // ── EXPORT WORD ──
  async function exportWord() {
    const { Document, Packer, Paragraph, Table, TableRow, TableCell, TextRun, AlignmentType, WidthType } = docx;

    const filtered = getFiltered();
    const total = filtered.reduce((s,g) => s+g.valor, 0);
    const avg = filtered.length ? total/filtered.length : 0;
    const periodo = getPeriodoLabel();
    const geradoEm = new Date().toLocaleDateString('pt-BR');

    const cell = (text, opts={}) => new TableCell({
      children: [new Paragraph({
        children: [new TextRun({ text, bold: opts.bold||false, size: opts.size||19, color: opts.color||'000000' })],
        alignment: opts.align || AlignmentType.LEFT
      })],
      shading: opts.bg ? { fill: opts.bg } : undefined,
      margins: { top: 70, bottom: 70, left: 110, right: 110 }
    });

    const headerRow = new TableRow({
      children: [
        cell('Data', { bold:true, bg:'EEEEEE', size:20 }),
        cell('Histórico / Descrição', { bold:true, bg:'EEEEEE', size:20 }),
        cell('Valor', { bold:true, bg:'EEEEEE', size:20, align: AlignmentType.RIGHT }),
      ]
    });

    const dataRows = filtered.map(g => new TableRow({
      children: [
        cell(g.data.split('-').reverse().join('/')),
        cell(g.hist),
        cell(formatBRL(g.valor), { align: AlignmentType.RIGHT }),
      ]
    }));

    const totalRow = new TableRow({
      children: [
        new TableCell({
          columnSpan: 2,
          children: [new Paragraph({ children: [new TextRun({ text: `TOTAL (${filtered.length} lançamentos)`, bold:true, size:20 })] })],
          shading: { fill: 'EEEEEE' },
          margins: { top:70, bottom:70, left:110, right:110 }
        }),
        cell(formatBRL(total), { bold:true, bg:'EEEEEE', size:20, align: AlignmentType.RIGHT }),
      ]
    });

    const doc = new Document({
      sections: [{
        children: [
          new Paragraph({ children: [new TextRun({ text: 'Relatório de Gastos', bold:true, size:40 })], alignment: AlignmentType.CENTER, spacing: { after: 120 } }),
          new Paragraph({ children: [new TextRun({ text: `Período: ${periodo}   ·   Gerado em: ${geradoEm}`, size:20, color:'666666' })], alignment: AlignmentType.CENTER, spacing: { after: 300 } }),
          new Paragraph({ children: [new TextRun({ text: `Total do período: ${formatBRL(total)}`, bold:true, size:24 })], spacing: { after: 80 } }),
          new Paragraph({ children: [new TextRun({ text: `Lançamentos: ${filtered.length}   ·   Média: ${formatBRL(avg)}`, size:21, color:'444444' })], spacing: { after: 320 } }),
          new Table({ width: { size: 100, type: WidthType.PERCENTAGE }, rows: [headerRow, ...dataRows, totalRow] }),
          new Paragraph({ children: [new TextRun({ text: `Documento gerado em ${geradoEm}`, size:18, color:'AAAAAA' })], alignment: AlignmentType.RIGHT, spacing: { before: 400 } }),
        ]
      }]
    });

    const blob = await Packer.toBlob(doc);
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `relatorio-gastos-${periodo.replace(/\s/g,'-').replace(/\//g,'-')}.docx`;
    a.click();
    URL.revokeObjectURL(url);
  }

  // Máscara valor
  document.getElementById('inp-valor').addEventListener('input', function() {
    let v = this.value.replace(/\D/g,'');
    if (!v) { this.value=''; return; }
    v = (parseInt(v)/100).toFixed(2);
    this.value = parseFloat(v).toLocaleString('pt-BR',{minimumFractionDigits:2});
  });

  document.getElementById('inp-hist').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('inp-valor').focus(); });
  document.getElementById('inp-valor').addEventListener('keydown', e => { if(e.key==='Enter') addItem(); });

  populateYears(); populateMonths(); render();
</script>
</body>
</html>
